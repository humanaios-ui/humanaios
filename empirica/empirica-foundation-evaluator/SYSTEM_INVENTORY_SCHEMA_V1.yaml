# ============================================================================
# SECTION 3: WORKFLOWS INVENTORY
# ============================================================================
workflows_inventory:
  summary:
    total_workflows: 35
    ci_cd_workflows: 15
    empirica_gate_workflows: 8
    custom_automation: 12

  github_actions:
    - workflow_file: ".github/workflows/ci.yml"
      repos: ["empirica", "operations", "humanaios", "lasting-light-ai"]
      triggers: ["push", "pull_request"]
      jobs:
        - name: "pytest"
          purpose: "Run Python unit + integration tests"
          environment: "Ubuntu"
        - name: "ruff-lint"
          purpose: "Python linting (enforce code style)"
          environment: "Ubuntu"
        - name: "pyright-typecheck"
          purpose: "Static type checking (Python)"
          environment: "Ubuntu"
    - workflow_file: ".github/workflows/empirica-gates.yml"
      repos: ["empirica", "operations"]
      triggers: ["pull_request"]
      jobs:
        - name: "empirica-preflight"
          purpose: "Transaction discipline gate: open preflight on PR"
        - name: "empirica-postflight"
          purpose: "Validate postflight + artifacts logged before merge"
    - workflow_file: ".github/workflows/deploy.yml"
      repos: ["lasting-light-ai", "HAIOSCC", "ACAT-Dashboard"]
      triggers: ["push main"]
      jobs:
        - name: "build-react"
          purpose: "Vite build for React UIs"
        - name: "deploy-cloudflare"
          purpose: "Deploy to Cloudflare Workers"

  empirica_cli_flows:
    - flow_name: "Transaction lifecycle"
      steps:
        - "empirica preflight-submit (opens transaction, validates vectors)"
        - "noetic phase: empirica noetic-batch / Read/Grep/Glob"
        - "empirica check-submit (gates NOETIC→PRAXIC)"
        - "praxic phase: code edits, tests, commits"
        - "empirica finding-log, decision-log, unknown-log (artifact logging)"
        - "empirica postflight-submit (closes transaction, grounded calibration)"
      criticality: "CRITICAL"
    - flow_name: "Artifact logging"
      steps:
        - "empirica finding-log --finding \"...\" --impact 0.7"
        - "empirica unknown-log --unknown \"...\""
        - "empirica assumption-log --assumption \"...\" --confidence 0.8"
        - "empirica decision-log --choice \"...\" --rationale \"...\""
        - "empirica deadend-log --approach \"...\" --why-failed \"...\""
        - "empirica log-artifacts - (batch: nodes + edges)"
      criticality: "HIGH"
    - flow_name: "Goal + task tracking"
      steps:
        - "empirica goals-create --objective \"...\" --description \"...\""
        - "empirica goals-add-task --goal-id <ID> --description \"...\""
        - "empirica goals-complete-task --task-id <ID> --evidence \"...\""
      criticality: "HIGH"

  bash_scripts:
    - script: "scripts/bootstrap-local.sh"
      purpose: "Initialize local development environment"
      targets: ["All local practices"]
      criticality: "HIGH"
    - script: "scripts/verify-system.sh"
      purpose: "Validate all repos + dependencies + connections"
      targets: ["All local practices"]
      criticality: "HIGH"
    - script: "deployment/deploy-foundation.sh"
      purpose: "Deploy all foundation services (docker-compose, Empirica, MCP servers)"
      targets: ["Foundation practices"]
      criticality: "CRITICAL"

# ============================================================================
# SECTION 4: METHODS INVENTORY
# ============================================================================
methods_inventory:
  summary:
    total_methods: 45
    procedures: 15
    protocols: 12
    patterns: 18

  procedures:
    - name: "Transaction discipline"
      applies_to: "All empirica practitioners"
      steps:
        - "1. PREFLIGHT: Declare scope, vector estimates, work type"
        - "2. NOETIC: Investigate, log findings/unknowns/assumptions"
        - "3. CHECK: Gate readiness to proceed"
        - "4. PRAXIC: Implement, log decisions/artifacts"
        - "5. POSTFLIGHT: Close transaction, grounded calibration"
      documentation: "empirica-system-prompt.md, epistemic-transaction.md"
      criticality: "CRITICAL"

    - name: "Z3 Protocol (Authority + Execution Discipline)"
      applies_to: "All code changes in LastingLightAI + humanaios ecosystem"
      steps:
        - "Z1: Chat deliberation (no mutations, discussion in Slack #wgs-sync)"
        - "Z2: Authority documents (design doc, spec, RFC in Z2 folder)"
        - "Z3: Terminal execution (code commit with 10-point preflight + 3-point execution)"
      specification: "LastingLightAI/Operations/Z3_PROTOCOL.md"
      criticality: "CRITICAL"

    - name: "ACAT Assessment"
      applies_to: "AI self-assessment calibration (HumanAIOS + Empirica)"
      steps:
        - "Phase 1: LLM response to 6-dimension questionnaire"
        - "Phase 2: Multi-provider evaluation (6 LLM providers via Make.com)"
        - "Phase 3: Dimension scoring (0–100 scale, Likert Independence calculation)"
        - "Phase 4: Empirica grounding (self-assessment vs grounded state divergence)"
      specification: "LastingLightAI/Operations/acat_phase1_prompt_v5_4.txt, etc."
      criticality: "CRITICAL"

    - name: "Governance Sync (WGS)"
      applies_to: "All decisions in humanaios + empirica orgs"
      frequency: "Weekly"
      location: "Slack #wgs-sync + #acat-monitor"
      outputs:
        - "Decision log (what was decided)"
        - "Metrics (N_total assessments, N_Phase1 complete, LI average)"
        - "Alerts (policy violations, compliance flags)"
      criticality: "HIGH"

  protocols:
    - name: "Mesh discipline (multi-practice coordination)"
      applies_to: "Collab, propose, mailbox workflows"
      rules:
        - "Pull when uncertain (collab is auto-accepted, ungated)"
        - "Push when convergent (propose is ECO-gated after CHECK)"
        - "Ack what you complete (mailbox reply with commit SHA)"
        - "Don't drop threads (reply even if 'can't help')"
      documentation: "/empirica-constitution §V, /cortex-mailbox-send"
      criticality: "HIGH"

    - name: "Document control"
      applies_to: "All system documentation, schema, audit trails"
      rules:
        - "Single source of truth: Git-tracked YAML + Empirica graph"
        - "Versioning: SemVer for schema (v1.0, v1.1, v2.0)"
        - "Change log: Every breaking change documented + migration guide"
        - "Audit trail: git log + empirica finding-log + Z3 Protocol authority docs"
      criticality: "HIGH"

    - name: "Secret management"
      applies_to: "All credentials, API keys, private data"
      rules:
        - "Never paste credentials in chat/terminal (Z3_PROTOCOL B-9)"
        - "Use GitHub Secrets (for CI/CD) or macOS Keychain (for local)"
        - "All API keys in .env (git-ignored, never committed)"
        - "Rotate credentials on: org member removal, breach suspicion, quarterly"
      criticality: "CRITICAL"

  patterns:
    - name: "Empirica measurement integration"
      applies_to: "All code changes in empirica seats"
      pattern: |
        PREFLIGHT (declare vectors) →
        NOETIC (investigate) →
        CHECK (gate) →
        PRAXIC (implement + finding-log decisions) →
        POSTFLIGHT (grounded calibration)
      example_repos: ["empirica-foundation-evaluator", "empirica-autonomy", "empirica-mesh-support"]
      criticality: "CRITICAL"

    - name: "Multi-provider evaluation"
      applies_to: "Assessment dispatch (ACAT)"
      pattern: |
        Task definition →
        Dispatch via Make.com webhook →
        6 LLM providers (Anthropic, OpenAI, Google, Mistral, Cohere, Llama) →
        Parallel evaluation →
        Dimension scoring (0–100 per dimension) →
        Consensus calculation (Likert Independence) →
        Empirica grounding
      example_usage: "acat-bot-test.yml, ACAT_PROMPT_V5_4.txt"
      criticality: "CRITICAL"

    - name: "React + Supabase integration"
      applies_to: "Modern UIs (lasting-light-ai, HAIOSCC, ACAT-Dashboard)"
      pattern: |
        React component (Vite bundler) →
        Supabase auth (session token) →
        Real-time subscription (assessment updates) →
        TailwindCSS styling →
        Deployment (Cloudflare Workers)
      example_repos: ["lasting-light-ai", "HAIOSCC", "ACAT-Dashboard"]
      criticality: "HIGH"

