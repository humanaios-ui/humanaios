# ============================================================================
# DOCUMENT CONTROL & MAINTENANCE
# ============================================================================

document_control:
  authority:
    owner: "empirica-foundation-evaluator"
    maintainer: "Carly R. Anderson (Admiral)"
    update_cycle: "Per milestone completion"
    approval_gate: "Admiral Z2 sign-off"

  change_procedures:
    new_ratification: |
      1. Run Z2 ratification (5 questions, Admiral decisions)
      2. Create Z2_RATIFICATION_DECISION_LOG_<NAME>.md (temporary, captures decisions)
      3. Add entry to this GOVERNANCE_RATIFICATIONS_REGISTRY.yaml
      4. Archive decision log as reference (link from registry)
      5. Commit registry + decision log together

    minor_updates: "Update registry YAML, commit, log as finding"

    breaking_changes: |
      Z3 Protocol: Z1 (chat deliberation), Z2 (authority doc), Z3 (commit with 10-point preflight)
      Note: This registry itself may undergo breaking-change evolution as governance matures

  verification_checklist:
    - "[ ] All Z2 decisions captured (Q1-5 answers)"
    - "[ ] Implementation status tracked (Live / Blocked-On / Awaiting)"
    - "[ ] Commits logged (SHAs for traceability)"
    - "[ ] Gate blockers identified (what depends on this decision)"
    - "[ ] Timeline tracked (target vs actual decision dates)"
    - "[ ] No orphaned ratification documents (all indexed in registry)"

