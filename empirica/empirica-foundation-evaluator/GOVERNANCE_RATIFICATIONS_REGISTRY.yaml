# ============================================================================
# REFERENCE: Z2 RATIFICATION TEMPLATE (For Future Decisions)
# ============================================================================

z2_ratification_template: |
  <decision_id>:
    decision_id: "GOV-YYYY-MM-DD-<NAME>"
    title: "<Full title of governance decision>"
    milestone: "<M? Rank ?>"
    status: "✅ Z2-RATIFIED | ⏳ Z2-IN-PROGRESS | ⏳ Z2-PENDING"
    ratification_date: "YYYY-MM-DD"
    target_decision_date: "YYYY-MM-DD"
    actual_decision_date: "YYYY-MM-DD or null"

    documents:
      proposal: "<GOVERNANCE_RATIFICATION_*.md>"
      specification: ["<SPEC_*.md>"]
      decision_log: "<Z2_RATIFICATION_DECISION_LOG_*.md>"

    scope: N
    scope_items:
      - "Item 1 (description)"
      - "Item 2 (description)"

    ratification_questions: N
    ratification_answers:
      q1_<name>:
        question: "<Admiral decides: Q1?>"
        answer: "✅ APPROVE | ✅ CONDITIONAL-APPROVE | ⏳ AWAITING"
        rationale: "<Why Admiral approved/conditional/waiting>"
        condition: "(if conditional) <What's the condition?>"
        impact: "<What this enables or changes>"

    overall_decision: "✅ RATIFY | ✅ CONDITIONAL | ⏳ IN-PROGRESS | ⏳ PENDING"
    admiral_notes: "<Admiral commentary>"

    implementation_impact:
      status: "LIVE | BLOCKED-ON-<DEP> | AWAITING-<DEP>"
      effective_date: "YYYY-MM-DD or null"
      deployment: "<Where this applies>"
      gate_for:
        - "What this unblocks"

    commits:
      - sha: "<git sha>"
        message: "<commit message>"
        date: "YYYY-MM-DD"

